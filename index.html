<!DOCTYPE html>
<html>
<head>
<title>Tomato Sorting System</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#d9c7c5,#e7d8d6);
    text-align:center;
}

/* HEADER */

.header{
    padding:30px;
}

.header h1{
    color:#c62828;
    font-size:48px;
    letter-spacing:1px;
}

/* TOMATO IMAGE */

.logo{
    margin-top:10px;
}

.logo img{
    width:200px;
}


/* CONTAINER */

.container{
    width:60%;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 28px rgba(0,0,0,0.18);
}

/* TITLE */

.container h2{
    font-size:26px;
    margin-bottom:20px;
}

/* BUTTON */

.start-btn{
    margin-top:25px;
    padding:14px 34px;
    font-size:18px;
    background:#e53935;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.start-btn:hover{
    background:#c62828;
    transform:scale(1.05);
}

/* FOOTER */

.footer{
    margin-top:30px;
    color:#333;
    font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<h1>🍅 Tomato Sorting System</h1>
</div>

<!-- LOGO IMAGE -->

<div class="logo">
<img src="ad144de3-dd81-499f-889e-c1c3652d7a81.png" alt="Tomato Logo">
</div>

<div class="container">

<h2>AI Powered Tomato Quality Detection</h2>

<button class="start-btn" onclick="startApp()">Get Started</button>

</div>

<div class="footer">
AI Based Tomato Sorting System • Project Demo
</div>

<script>

function startApp(){
    window.location.href="detect.html";
}

</script>

</body>
</html>
