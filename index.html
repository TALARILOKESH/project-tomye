<!DOCTYPE html>
<html>
<head>
<title>Tomato Sorting System</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#d9c7c5,#e7d8d6);
    text-align:center;
}

/* HEADER */

.header{
    padding:40px 20px 20px 20px;
}

.header h1{
    color:#c62828;
    font-size:48px;
    letter-spacing:1px;
}

/* LOGO (FLOAT EFFECT) */

.logo{
    margin-top:15px;
}

.logo img{
    width:200px;
    transition:transform 0.3s ease;
}

/* subtle hover effect */

.logo img:hover{
    transform:scale(1.08);
}

/* CONTAINER */

.container{
    width:60%;
    margin:40px auto;
    background:white;
    padding:45px;
    border-radius:14px;
    box-shadow:0 10px 28px rgba(0,0,0,0.18);
}

/* DESCRIPTION (visual hierarchy improvement) */

.description{
    font-size:19px;
    line-height:1.7;
    color:#444;
    margin-bottom:20px;
}

/* BUTTON (interactive improvement) */

.start-btn{
    margin-top:30px;
    padding:15px 36px;
    font-size:18px;
    background:#e53935;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 6px 14px rgba(0,0,0,0.2);
    transition:all 0.25s ease;
}

.start-btn:hover{
    background:#c62828;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* FEATURE SECTION */

.features{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
    flex-wrap:wrap;
}

/* FEATURE CARDS */

.feature-card{
    width:220px;
    background:white;
    padding:18px;
    border-radius:10px;
    box-shadow:0 6px 16px rgba(0,0,0,0.12);
}

.feature-card h3{
    margin-bottom:10px;
    color:#c62828;
}

.feature-card p{
    font-size:14px;
    color:#555;
}

/* FOOTER */

.footer{
    margin-top:40px;
    color:#444;
    font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h1>🍅 Tomato Sorting System</h1>
</div>

<!-- LOGO IMAGE -->

<div class="logo">
<img src="ad144de3-dd81-499f-889e-c1c3652d7a81.png" alt="Tomato Logo">
</div>

<div class="container">

<h2>AI Powered Tomato Quality Detection</h2>

<button class="start-btn" onclick="startApp()">Get Started</button>

</div>

<div class="footer">
AI Based Tomato Sorting System • Project Demo
</div>

<script>

function startApp(){
    window.location.href="detect.html";
}

</script>

</body>
</html>
