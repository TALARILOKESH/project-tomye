<!DOCTYPE html>
<html>
<head>
<title>Tomato Sorting System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍅 Tomato Sorting System</h1>

<div class="upload-box">
<input type="file" id="imageInput" accept="image/*">
<button onclick="processImage()">Analyze</button>
</div>

<div class="image-container">

    <!-- LEFT SIDE -->
    <div class="image-box">
        <h2>Input Image</h2>
        <img id="preview" width="350" style="display:none;">
    </div>

    <!-- RIGHT SIDE -->
    <div class="image-box">
        <h2>Detected Image</h2>
        <img id="resultImage" width="350" style="display:none;">

        <p id="classificationResult">
        Good Tomatoes: 0 <br>
        Bad Tomatoes: 0
        </p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
