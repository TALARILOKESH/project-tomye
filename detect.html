<body>

<h1>🍅 Tomato Sorting System</h1>

<input type="file" id="imageInput" accept="image/*">
<button onclick="processImage()">Analyze</button>

<br><br>

<div class="image-container">

    <!-- INPUT IMAGE -->
    <div class="upload-box">

    <!-- CAMERA OPTION -->
    <label class="btn">
        📷 Scan from Camera
        <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
    </label>

    <!-- GALLERY OPTION -->
    <label class="btn">
        🖼 Choose from Gallery
        <input type="file" id="imageInput" accept="image/*" hidden>
    </label>

    <button onclick="processImage()">Analyze</button>

    </div>

    <!-- DETECTED IMAGE -->
    <div class="image-box">
        <h3>Detected Image</h3>
        <img id="resultImage" width="350" style="display:none; border:1px solid #ccc;">

        <div id="tomatoCounts">
            Good Tomatoes: 0 <br>
            Bad Tomatoes: 0
        </div>
    </div>

</div>

<br>

<h3 id="result"></h3>

<script src="script.js"></script>

</body>
