<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="tomato-icon">
🍅
</div>
<h1>🍅 Tomato Sorting System</h1>

<div class="upload-section">

<h2>Select an image</h2>

<label class="big-btn">
📷 Scan for image
<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
</label>

<label class="big-btn">
🖼 Choose from gallery
<input type="file" id="imageInput" accept="image/*" hidden>
</label>

<button class="analyze-btn" onclick="processImage()">Analyze</button>

</div>

<div class="image-container">

    <!-- INPUT IMAGE -->
    <div class="image-box">
        <h3>Input Image</h3>
        <img id="preview" width="350" style="display:none;">
    </div>

    <!-- DETECTED IMAGE -->
    <div class="image-box">
        <h3>Detected Image</h3>
        <img id="resultImage" width="350" style="display:none;">

        <div id="classificationResult">
            Good Tomatoes: 0 <br>
            Bad Tomatoes: 0
        </div>
    </div>

</div>

<br>

<h3 id="result"></h3>

<script src="script.js"></script>

</body>
